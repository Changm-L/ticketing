version: '3'
services:
  mysql:
    container_name: "database"
    image: mysql:8.0
    ports:
      - "53306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=application
      - MYSQL_PASSWORD=application
      - MYSQL_DATABASE=hhplus
    volumes:
      - ./data/mysql/:/var/lib/mysql
  redis:
    container_name: "redis-server"
    image: redis:8-alpine
    ports:
      - "56379:6379"


networks:
  default:
    driver: bridge